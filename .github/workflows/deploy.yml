name: Deploy to AWS Lambda

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            common:
              - 'common/**'
              - '.gitignore'
              - 'package-lock.json'
              - 'package.json'
              - 'tsconfig.json'
            moo_v_bot:
              - 'moo_v_bot/**'
            rock_paper_scissors_bot:
              - 'rock_paper_scissors_bot/**'

      - name: Zip the required files and folders
        run: |
          mkdir -p layer_output/nodejs
          mv layer_output/common layer_output/nodejs/
          cp common/*.json layer_output/nodejs/common/
          cp -r node_modules layer_output/nodejs/
          cd layer_output
          zip -r layer.zip nodejs
          find . -type d -name 'nodejs' -prune -o -type f -exec sed -i 's|\(\.\./\)\+common|/opt/nodejs/common|g' {} +
          (cd moo_v_bot && zip -r ../moo_v_bot.zip . && cd ..)
          (cd rock_paper_scissors_bot && zip -r ../rock_paper_scissors_bot.zip . && cd ..)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update moo_v_bot Lambda Function
        if: steps.changes.outputs.moo_v_bot == 'true'
        run: |
          aws lambda update-function-code --function-name moo_v_bot --zip-file fileb://layer_output/moo_v_bot.zip --query 'FunctionName' --output text

      - name: Update moo_v_bot_producer Lambda Function
        if: steps.changes.outputs.moo_v_bot == 'true'
        run: |
          aws lambda update-function-code --function-name moo_v_bot_producer --zip-file fileb://layer_output/moo_v_bot.zip --query 'FunctionName' --output text

      - name: Update rock_paper_scissors_bot Lambda Function
        if: steps.changes.outputs.rock_paper_scissors_bot == 'true'
        run: |
          aws lambda update-function-code --function-name rock_paper_scissors_bot --zip-file fileb://layer_output/rock_paper_scissors_bot.zip --query 'FunctionName' --output text

      - name: Update Lambda Layer
        if: steps.changes.outputs.common == 'true'
        run: |
          COMMON_LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name base_bot_deps \
            --description "Updated Common Layer" \
            --zip-file fileb://layer_output/layer.zip \
            --query 'LayerVersionArn' --output text)

          # Find the latest ARN for the AppConfig Extension in your account/region
          APPCONFIG_LAYER_ARN="arn:aws:lambda:${{ secrets.AWS_REGION }}:027255383542:layer:AWS-AppConfig-Extension:296"
            
          # Function relying on "base_bot_deps" layer
          FUNCTIONS=("moo_v_bot" "moo_v_bot_producer" "rock_paper_scissors_bot")

          for FUNCTION in "${FUNCTIONS[@]}"; do
            echo "Updating $FUNCTION..."

            # Update the function with BOTH layers (This prevents overwriting)
            aws lambda update-function-configuration \
              --function-name "$FUNCTION" \
              --layers "$COMMON_LAYER_ARN" "$APPCONFIG_LAYER_ARN" \
              --query 'Layers[].Arn' \
              --output table
          done

      - name: Clean up
        run: rm -rf layer_output
